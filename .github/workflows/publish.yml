name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Typecheck plugin
        run: bun tsc --project plugin/tsconfig.json --noEmit

      - name: Lint
        run: bun run check

      - name: Test
        run: bun test

      - name: Build
        run: bun run prepare

      - name: Publish
        run: npm publish --provenance --access public
