name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Typecheck plugin
        run: bun tsc --project plugin/tsconfig.json --noEmit

      - name: Lint
        run: bun run check

      - name: Test
        run: bun test

      - name: Generate Nitrogen bindings
        run: bun run nitrogen

      - name: Build
        run: bun run prepare

      - name: Publish
        run: npm publish

      - name: Get version
        id: version
        run: echo "version=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          mode: "COMMIT"
          toTag: ${{ steps.version.outputs.version }}
          configurationJson: |
            {
              "categories": [
                { "title": "## 🚀 Features", "labels": [] },
                { "title": "## 🐛 Bug Fixes", "labels": [] }
              ],
              "template": "#{{UNCATEGORIZED}}",
              "commit_template": "- #{{TITLE}}"
            }
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.version }}" --title "${{ steps.version.outputs.version }}" --notes "${{ steps.changelog.outputs.changelog }}"
