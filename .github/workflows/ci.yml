name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Typecheck plugin
        run: bun tsc --project plugin/tsconfig.json --noEmit

      - name: Lint
        run: bun run check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Build plugin
        run: bun run build:plugin
